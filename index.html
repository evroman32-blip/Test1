<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    main {
      background: #fff;
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 32px;
      line-height: 1.3;
    }

    ul {
      list-style: none;
    }

    li {
      padding: 16px 20px;
      margin-bottom: 12px;
      background: #f5f5f7;
      border-radius: 10px;
      font-size: 1.05rem;
      line-height: 1.5;
    }

    li:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Генератор идей для постов</h1>
    <ul>
      <li>Пять идей постов для экспертов</li>
      <li>3 идеи для сториз на сегодня</li>
      <li>Контент-план на неделю</li>
    </ul>
  </main>
</body>
</html>
